# ─── Prometheus Configuration ─────────────────────────────────────────────────
# Scrapes: FastAPI /metrics, Redis (via redis_exporter), PostgreSQL (via pg_exporter)
# Retention: 15 days (adjust via --storage.tsdb.retention.time)

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    environment: "local"
    platform:    "quantnexus"

# ─── Alerting rules file ───────────────────────────────────────────────────────
rule_files:
  - "rules/*.yml"

# ─── Scrape targets ────────────────────────────────────────────────────────────
scrape_configs:
  # FastAPI backend — prometheus-fastapi-instrumentator exposes /metrics
  - job_name: "quantnexus-backend"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics
    scrape_interval: 10s

  # Redis exporter (oliver006/redis_exporter)
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]

  # PostgreSQL / TimescaleDB exporter (prometheuscommunity/postgres-exporter)
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Celery worker metrics via Flower or celery-exporter
  - job_name: "celery"
    static_configs:
      - targets: ["celery-exporter:9808"]
