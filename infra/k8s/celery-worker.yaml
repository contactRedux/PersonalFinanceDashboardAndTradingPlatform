---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: quantnexus
  labels:
    app: celery-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
        - name: celery-worker
          image: quantnexus-backend:latest
          command:
            - celery
            - -A
            - app.tasks.celery_app
            - worker
            - -l
            - info
          envFrom:
            - secretRef:
                name: quantnexus-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
