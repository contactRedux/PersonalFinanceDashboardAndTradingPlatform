# ─── Local dev overrides: hot reload, exposed debug ports ─────────────────────
version: "3.9"

services:
  backend:
    command: uv run uvicorn app.main:app --host 127.0.0.1 --port 8000 --reload
    environment:
      APP_ENV: development

  frontend:
    command: npm run dev
    environment:
      NODE_ENV: development
