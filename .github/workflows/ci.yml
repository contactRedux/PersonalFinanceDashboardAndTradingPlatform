name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Backend: lint, typecheck, test ─────────────────────────────────────────
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check app/ tests/

      - name: Format check (ruff)
        run: uv run ruff format --check app/ tests/

      - name: Security scan (bandit)
        run: uv run bandit -r app/ -ll

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short
        env:
          APP_ENV: test
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production
          JWT_ALGORITHM: HS256

  # ─── E2E: Playwright (all specs — credential-gated tests skip gracefully) ────
  e2e:
    name: E2E (Playwright — all specs)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    # Run after frontend build passes
    needs: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test tests/e2e/ --reporter=list
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_WS_URL: ws://localhost:8000
          # TEST_USER_EMAIL and TEST_USER_PASSWORD intentionally absent — credential-gated tests will gracefully skip

  # ─── Live data integration (runs only when secrets are present) ─────────────
  live-data:
    name: Live Data Integration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    # Only run when the Alpaca secret is present.
    # This job is intentionally skipped for forks that do not have repository
    # secrets configured — fork CI runs remain green without live credentials.
    if: ${{ secrets.ALPACA_SECRET_KEY != '' }}
    needs: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run live-data integration tests
        run: uv run pytest tests/integration/test_api.py -v --tb=short
        env:
          APP_ENV: test
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production
          JWT_ALGORITHM: HS256
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL: https://paper-api.alpaca.markets
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

  # ─── Frontend: lint, typecheck, build ───────────────────────────────────────
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type check (tsc)
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm run test -- --run

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_WS_URL: ws://localhost:8000

  # ─── Load tests: k6 (manual trigger only) ────────────────────────────────────
  load-test:
    name: Load Test (k6)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install k6

      - name: Start services
        run: docker compose up -d --wait
        env:
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY || 'ci-load-test-secret-key-32chars-min' }}

      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && break
            sleep 2
          done

      - name: Run WebSocket load test
        run: k6 run tests/load/ws_market.js

      - name: Run REST auth load test
        run: k6 run tests/load/rest_auth.js

  # ─── Terraform: validate IaC (no backend, no credentials needed) ─────────────
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init (no backend)
        run: terraform init -backend=false
        working-directory: infra/terraform

      - name: Terraform validate
        run: terraform validate
        working-directory: infra/terraform
